    <!-- Critical CSS inline -->
    <style>
      body{background:#070B10;color:#F4F7FA;font-family:Inter,sans-serif;overflow-x:hidden;margin:0;padding:0}
      html,body,#root{margin:0;padding:0;min-height:100%}

      #root{min-height:100vh;display:flex;flex-direction:column}
      
      /* Tailwind CSS Reset Styles - Basic Fallback */
      * { box-sizing: border-box; }
      button { cursor: pointer; }
      img { max-width: 100%; display: block; }
      
      /* Flexbox utilities */
      .flex { display: flex; }
      .flex-col { flex-direction: column; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .gap-2 { gap: 0.5rem; }
      .gap-3 { gap: 0.75rem; }
      .gap-4 { gap: 1rem; }
      .mb-2 { margin-bottom: 0.5rem; }
      .mb-4 { margin-bottom: 1rem; }
      .mb-6 { margin-bottom: 1.5rem; }
      .mt-20 { margin-top: 5rem; }
      .p-4 { padding: 1rem; }
      .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
      .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
      .rounded-lg { border-radius: 0.5rem; }
      .rounded-xl { border-radius: 0.75rem; }
      .border { border-width: 1px; }

      /* Typography */

      .text-sm { font-size: 0.875rem; }
      .text-lg { font-size: 1.125rem; }
      .text-xl { font-size: 1.25rem; }

      /* Common utilities */
      .relative { position: relative; }

      .absolute { position: absolute; }
      .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
      .z-0 { z-index: 0; }
      .z-10 { z-index: 10; }
    </style>
    
    <!-- Load Tailwind CSS with retry logic -->
    <script>
      (function() {
        var retryCount = 0;
        var maxRetries = 3;
        
        function loadTailwind() {
          var script = document.createElement('script');
          script.src = 'https://cdn.tailwindcss.com';
          script.async = true;
          script.onerror = function() {
            retryCount++;
            if (retryCount < maxRetries) {
              setTimeout(loadTailwind, 2000);
            } else {
              console.warn('Failed to load Tailwind CSS from CDN after ' + maxRetries + ' retries');
              // Show fallback message
              document.body.innerHTML += '<div style="position:fixed;bottom:10px;left:10px;background:rgba(240,82,82,0.1);border:1px solid rgba(240,82,82,0.3);color:#f87171;padding:12px;border-radius:8px;font-size:12px;z-index:9999">鈿狅笍 Some styles may not load properly. Refreshing the page may help.</div>';
            }
          };
          document.head.appendChild(script);
        }
        
        loadTailwind();
      })();
    </script>
    <script>
      // Tailwind config - load after script loads with safety checks
      window.addEventListener('load', function() {
        if (window.tailwind) {
          try {
            tailwind.config = {
              theme: {
                extend: {
                  colors: {
                    knights: {
                      50: '#F4F7FA', 100: '#E8EEF5', 200: '#C7D2DF', 300: '#9BAABD',
                      400: '#39BDF8', 500: '#0EA5E9', 600: '#0284C7', 700: '#16212B',
                      800: '#101820', 900: '#070B10', 950: '#05070A',
                    },
                    gold: {
                      50: '#FFF8DF', 100: '#FDEFB8', 200: '#F3D27A', 300: '#E8BE45',
                      400: '#D6B15A', 500: '#B88919', 600: '#936B12', 700: '#6E4D0E',
                      800: '#4A340B', 900: '#2D2108',
                    },
                  },
                  fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    mono: ['Fira Code', 'monospace'],
                  },
                }
              }
            }
          } catch(e) {
            console.warn('Failed to configure Tailwind:', e);
          }
        }
      }, { once: true });
    </script>
    <script>
      // Legacy runtime variable compatibility for cached old chunks.
      var DEX_ROUTER_ADDRESS = "%VITE_DEX_ROUTER_ADDRESS%";
      var DEX_PAIR_ADDRESS = "%VITE_DEX_PAIR_ADDRESS%";
      var USDT_TOKEN_ADDRESS = "%VITE_USDT_ADDRESS%";
      var KNIGHTS_TOKEN_ADDRESS = "%VITE_SEER_TOKEN_ADDRESS%";
